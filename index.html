<!DOCTYPE html>
<html>
<head>
<title>Advanced Snake Game</title>

<style>
body{
text-align:center;
font-family:Arial;
background:#222;
color:white;
}

canvas{
background:black;
margin-top:20px;
}

button{
padding:10px 20px;
font-size:16px;
margin:5px;
}

#controls{
margin-top:10px;
}
</style>

</head>

<body>

<h2>Snake Game</h2>

<button onclick="startGame()">Start Game</button>
<button onclick="restartGame()">Restart</button>

<h3 id="score">Score: 0</h3>

<canvas id="game" width="400" height="400"></canvas>

<div id="controls">
<br>
<button onclick="setDirection('UP')">⬆</button>
<br>
<button onclick="setDirection('LEFT')">⬅</button>
<button onclick="setDirection('DOWN')">⬇</button>
<button onclick="setDirection('RIGHT')">➡</button>
</div>

<script>

let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

let box=20;

let snake;
let food;
let direction;
let score;
let game;

function startGame(){

snake=[{x:200,y:200}];

food={
x:Math.floor(Math.random()*20)*box,
y:Math.floor(Math.random()*20)*box
};

direction="RIGHT";

score=0;

document.getElementById("score").innerHTML="Score: 0";

clearInterval(game);

game=setInterval(draw,100);

}

function restartGame(){
startGame();
}

document.addEventListener("keydown",function(event){

if(event.key==="ArrowLeft") setDirection("LEFT");
if(event.key==="ArrowUp") setDirection("UP");
if(event.key==="ArrowRight") setDirection("RIGHT");
if(event.key==="ArrowDown") setDirection("DOWN");

});

function setDirection(dir){

if(dir==="LEFT" && direction!=="RIGHT") direction="LEFT";
if(dir==="UP" && direction!=="DOWN") direction="UP";
if(dir==="RIGHT" && direction!=="LEFT") direction="RIGHT";
if(dir==="DOWN" && direction!=="UP") direction="DOWN";

}

function draw(){

ctx.fillStyle="black";
ctx.fillRect(0,0,400,400);

for(let i=0;i<snake.length;i++){

ctx.fillStyle=i==0?"lime":"green";
ctx.fillRect(snake[i].x,snake[i].y,box,box);

}

ctx.fillStyle="red";
ctx.fillRect(food.x,food.y,box,box);

let snakeX=snake[0].x;
let snakeY=snake[0].y;

if(direction==="LEFT") snakeX-=box;
if(direction==="UP") snakeY-=box;
if(direction==="RIGHT") snakeX+=box;
if(direction==="DOWN") snakeY+=box;

if(snakeX===food.x && snakeY===food.y){

score++;
document.getElementById("score").innerHTML="Score: "+score;

food={
x:Math.floor(Math.random()*20)*box,
y:Math.floor(Math.random()*20)*box
};

}else{

snake.pop();

}

let newHead={x:snakeX,y:snakeY};

if(
snakeX<0 || snakeY<0 ||
snakeX>=400 || snakeY>=400 ||
collision(newHead,snake)
){

clearInterval(game);
alert("Game Over");

}

snake.unshift(newHead);

}

function collision(head,array){

for(let i=0;i<array.length;i++){

if(head.x===array[i].x && head.y===array[i].y){
return true;
}

}

return false;

}

</script>

</body>
</html>
